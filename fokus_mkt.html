<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus Marketing - 1GCX SIMPANG MARTAPURA</title>
    
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-emerald-600 text-white py-6 px-4 text-center shadow-md">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-white hover:text-emerald-200 text-lg p-2">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-xl font-black tracking-wide uppercase flex-1">FOKUS MARKETING TOKO</h1>
            <div class="w-9"></div> <!-- Spacer balance -->
        </div>
        <p class="text-xs text-emerald-100 mt-1">1GCX SIMPANG MARTAPURA • Periode Aktif 2026</p>
    </header>

    <!-- UTAMA CONTAINER -->
    <main class="flex-1 max-w-xl w-full mx-auto p-4 space-y-4">

        <!-- PANEL PILIHAN NIK KASIR (SAMA SEPERTI PSM) -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <div class="border-b border-slate-100 pb-2 flex items-center gap-2">
                <i class="fa-solid fa-id-card text-emerald-600 text-lg"></i>
                <h2 class="text-sm font-black text-slate-700 uppercase tracking-wide">Identitas Kasir / Personel</h2>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- DROPDOWN PILIH NIK -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pilih NIK Kasir</label>
                    <div class="relative">
                        <select id="select-nik" onchange="pilihKasirOtomatis()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 appearance-none cursor-pointer">
                            <option value="">-- PILIH NIK --</option>
                            <option value="22014513">22014513</option>
                            <option value="22014456">22014456</option>
                            <option value="22012274">22012274</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-500">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- NAMA KASIR AUTOMATIC FIELD -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Kasir</label>
                    <input type="text" id="input-nama-kasir" readonly class="w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 font-black text-slate-700 cursor-not-allowed focus:outline-none" placeholder="Otomatis terisi...">
                </div>
            </div>
        </div>

        <!-- PANEL INPUT DATA PRODUK FOKUS -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <div class="border-b border-slate-100 pb-2 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-cart-plus text-emerald-600 text-lg"></i>
                    <h2 class="text-sm font-black text-slate-700 uppercase tracking-wide">Input Penjualan Fokus</h2>
                </div>
                <span id="save-toast" class="text-xs font-bold text-emerald-600 hidden animate-pulse"><i class="fa-solid fa-circle-check"></i> Tersimpan</span>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Produk Fokus</label>
                    <input type="text" id="input-produk" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 font-semibold text-slate-800 focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="Contoh: Aqua Karton / RTD Milk">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Target (Qty)</label>
                        <input type="number" id="input-target-qty" oninput="hitungSisaQty()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 font-bold text-slate-800 focus:ring-2 focus:ring-emerald-500 focus:outline-none" value="10">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Aktual Jual (Qty)</label>
                        <input type="number" id="input-aktual-qty" oninput="hitungSisaQty()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 font-bold text-slate-800 focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="0">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Sisa Kekurangan Target</label>
                    <input type="text" id="input-sisa-qty" readonly class="w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 font-black text-rose-600 cursor-not-allowed focus:outline-none" value="10">
                </div>

                <button onclick="simpanDataFokus()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3 px-4 rounded-xl shadow-md transition cursor-pointer text-sm">
                    <i class="fa-solid fa-plus mr-1"></i> TAMBAHKAN KE LAPORAN MKT
                </button>
            </div>
        </div>

        <!-- REKAPAN TABEL LAPORAN MARKETING -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-3">
                <h3 class="font-black text-slate-800 flex items-center gap-2 text-sm uppercase tracking-wider">
                    <i class="fa-solid fa-table-list text-emerald-600"></i> Laporan Realtime Toko
                </h3>
                <span id="data-count" class="text-xs font-bold bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full">0 Item</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-xs text-left text-slate-600">
                    <thead class="uppercase bg-slate-50 text-slate-700 border-b border-slate-200 font-bold">
                        <tr>
                            <th class="py-2.5 px-2">Kasir</th>
                            <th class="py-2.5 px-2">Produk</th>
                            <th class="py-2.5 px-2 text-center">Trgt</th>
                            <th class="py-2.5 px-2 text-center">Aktl</th>
                            <th class="py-2.5 px-2 text-center">Sisa</th>
                            <th class="py-2.5 px-2 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mkt-table-body" class="divide-y divide-slate-100 font-medium">
                        <!-- Diisi via Javascript -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- CORE LOGIC ENGINE FOR MARKETING -->
    <script>
        // Database NIK Kasir Master List Berdasarkan Request Terbaru
        const masterKasir = {
            "22014513": "Mudza",
            "22014456": "Sholahudin",
            "22012274": "Shinta"
        };

        // Storage internal untuk list transaksi marketing
        let dbMarketing = JSON.parse(localStorage.getItem('fokusmkt_db')) || [];

        // 1. Fungsi Dropdown Pilih NIK Otomatis isi Nama
        function pilihKasirOtomatis() {
            const nikDipilih = document.getElementById('select-nik').value;
            const inputNama = document.getElementById('input-nama-kasir');

            if (nikDipilih && masterKasir[nikDipilih]) {
                inputNama.value = masterKasir[nikDipilih];
                // Simpan NIK kasir terakhir yang dipilih agar tidak reset saat refresh hlm
                localStorage.setItem('fokusmkt_last_nik', nikDipilih);
            } else {
                inputNama.value = "";
                localStorage.removeItem('fokusmkt_last_nik');
            }
        }

        // 2. Hitung Otomatis Sisa Kekurangan Qty
        function hitungSisaQty() {
            const target = parseInt(document.getElementById('input-target-qty').value) || 0;
            const aktual = parseInt(document.getElementById('input-aktual-qty').value) || 0;
            const sisaField = document.getElementById('input-sisa-qty');

            const sisa = Math.max(0, target - aktual);
            sisaField.value = sisa;
            
            if (sisa === 0 && aktual >= target) {
                sisaField.value = "ACHIEVED (0)";
                sisaField.className = "w-full bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2.5 font-black text-emerald-600 cursor-not-allowed focus:outline-none";
            } else {
                sisaField.className = "w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 font-black text-rose-600 cursor-not-allowed focus:outline-none";
            }
        }

        function picuToast() {
            const toast = document.getElementById('save-toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 1200);
        }

        // 3. Simpan baris data ke tabel laporan
        function simpanDataFokus() {
            const nik = document.getElementById('select-nik').value;
            const nama = document.getElementById('input-nama-kasir').value;
            const produk = document.getElementById('input-produk').value.trim();
            const targetQty = parseInt(document.getElementById('input-target-qty').value) || 0;
            const aktualQty = parseInt(document.getElementById('input-aktual-qty').value) || 0;

            if (!nik || !nama || !produk) {
                alert("Harap pilih NIK Kasir dan isi Nama Produk terlebih dahulu!");
                return;
            }

            const sisaQty = Math.max(0, targetQty - aktualQty);

            dbMarketing.push({
                id: Date.now(),
                nik: nik,
                nama: nama,
                produk: produk,
                target: targetQty,
                aktual: aktualQty,
                sisa: sisaQty
            });

            localStorage.setItem('fokusmkt_db', JSON.stringify(dbMarketing));
            
            // Bersihkan field produk dan aktual saja, NIK tetap stay terpilih
            document.getElementById('input-produk').value = "";
            document.getElementById('input-aktual-qty').value = "";
            document.getElementById('input-target-qty').value = "10";
            document.getElementById('input-sisa-qty').value = "10";
            document.getElementById('input-sisa-qty').className = "w-full bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 font-black text-rose-600 cursor-not-allowed focus:outline-none";

            picuToast();
            renderTabelMarketing();
        }

        function hapusItemMarketing(id) {
            if (confirm("Hapus item fokus marketing ini dari laporan?")) {
                dbMarketing = dbMarketing.filter(item => item.id !== id);
                localStorage.setItem('fokusmkt_db', JSON.stringify(dbMarketing));
                renderTabelMarketing();
            }
        }

        // 4. Render data array ke tabel HTML
        function renderTabelMarketing() {
            const tbody = document.getElementById('mkt-table-body');
            document.getElementById('data-count').innerText = `${dbMarketing.length} Item`;

            if (dbMarketing.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-6 text-center text-slate-400 font-medium"><i class="fa-solid fa-folder-open text-lg block mb-1 opacity-40"></i>Belum ada data fokus marketing hari ini.</td></tr>`;
                return;
            }

            tbody.innerHTML = dbMarketing.map(item => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="py-3 px-2">
                        <div class="font-bold text-slate-800">${item.nama}</div>
                        <div class="text-[10px] text-slate-400 font-mono">${item.nik}</div>
                    </td>
                    <td class="py-3 px-2 font-semibold text-slate-700 capitalize">${item.produk}</td>
                    <td class="py-3 px-2 text-center font-bold text-slate-600">${item.target}</td>
                    <td class="py-3 px-2 text-center font-bold text-emerald-600">${item.aktual}</td>
                    <td class="py-3 px-2 text-center">
                        <span class="px-1.5 py-0.5 rounded font-black ${item.sisa === 0 ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                            ${item.sisa === 0 ? 'OK' : item.sisa}
                        </span>
                    </td>
                    <td class="py-3 px-2 text-center">
                        <button onclick="hapusItemMarketing(${item.id})" class="text-slate-400 hover:text-rose-600 p-1 transition cursor-pointer">
                            <i class="fa-solid fa-square-minus text-base"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 5. Load data terakhir pas buka halaman
        window.onload = function() {
            // Cek jika ada NIK kasir terakhir yang tersimpan di memori browser
            const lastNik = localStorage.getItem('fokusmkt_last_nik');
            if (lastNik) {
                document.getElementById('select-nik').value = lastNik;
                pilihKasirOtomatis();
            }
            renderTabelMarketing();
        };
    </script>
</body>
</html>
