<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus MKT - Simpang Martapura 1GCX</title>
    
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div class="max-w-md mx-auto p-4 min-h-screen flex flex-col justify-between">
        
        <!-- HEADER -->
        <header class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-4 flex items-center gap-3">
            <div class="bg-emerald-500 text-white p-3 rounded-xl shadow-sm">
                <i class="fa-solid fa-bullhorn text-xl"></i>
            </div>
            <div>
                <span class="text-xs font-bold text-emerald-600 tracking-wider block uppercase">Marketing Performance</span>
                <h1 class="text-lg font-black text-slate-900">Input Fokus MKT</h1>
            </div>
        </header>

        <!-- FORM INPUT UTAMA -->
        <main class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4 flex-1">
            
            <!-- INFO KARYAWAN (STATIS / BISA DIUBAH) -->
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 grid grid-cols-2 gap-2 text-xs font-semibold text-slate-600">
                <div>Toko: <span class="text-slate-900 font-bold block">Simpang Martapura 1GCX</span></div>
                <div>Nama: <span class="text-slate-900 font-bold block">Solahudin</span></div>
                <div class="col-span-2 pt-1 border-t border-slate-200 mt-1">NIK: <span class="text-slate-900 font-bold">26014456</span></div>
            </div>

            <hr class="border-slate-100">

            <!-- INPUT PRODUK MKT -->
            <div class="space-y-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-basket-shopping mr-1"></i> Data Item & Promo</h3>
                
                <!-- PSM -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <label class="block text-xs font-bold text-slate-700">🚀 PSM (Target / Realisasi)</label>
                    <div class="grid grid-cols-3 gap-2 items-center">
                        <input type="number" id="psm-tgt" placeholder="Tgt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="24" oninput="hitungOtomatis()">
                        <input type="number" id="psm-akt" placeholder="Akt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="5" oninput="hitungOtomatis()">
                        <div id="psm-pct" class="text-center font-black text-slate-700 text-sm">0%</div>
                    </div>
                </div>

                <!-- PWP -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <label class="block text-xs font-bold text-slate-700">🛍️ PWP (Target / Realisasi)</label>
                    <div class="grid grid-cols-3 gap-2 items-center">
                        <input type="number" id="pwp-tgt" placeholder="Tgt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="12" oninput="hitungOtomatis()">
                        <input type="number" id="pwp-akt" placeholder="Akt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="4" oninput="hitungOtomatis()">
                        <div id="pwp-pct" class="text-center font-black text-slate-700 text-sm">0%</div>
                    </div>
                </div>

                <!-- SERBA -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <label class="block text-xs font-bold text-slate-700">🪙 SERBA (Target / Realisasi)</label>
                    <div class="grid grid-cols-3 gap-2 items-center">
                        <input type="number" id="serba-tgt" placeholder="Tgt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="8" oninput="hitungOtomatis()">
                        <input type="number" id="serba-akt" placeholder="Akt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="4" oninput="hitungOtomatis()">
                        <div id="serba-pct" class="text-center font-black text-slate-700 text-sm">0%</div>
                    </div>
                </div>

                <!-- SUUEGER -->
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <label class="block text-xs font-bold text-slate-700">🍹 SUUEGER (Target / Realisasi)</label>
                    <div class="grid grid-cols-3 gap-2 items-center">
                        <input type="number" id="suueger-tgt" placeholder="Tgt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="10" oninput="hitungOtomatis()">
                        <input type="number" id="suueger-akt" placeholder="Akt" class="w-full px-2 py-1.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm" value="2" oninput="hitungOtomatis()">
                        <div id="suueger-pct" class="text-center font-black text-slate-700 text-sm">0%</div>
                    </div>
                </div>

                <!-- CASHBACK & VOUCHER -->
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-1">
                        <label class="block text-xs font-bold text-slate-700">💰 Cashback</label>
                        <input type="text" id="cashback" placeholder="Isi manual jika ada" class="w-full px-3 py-1.5 bg-white border border-slate-300 rounded-lg font-bold text-sm text-center">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-1">
                        <label class="block text-xs font-bold text-slate-700">🎟️ Voucher</label>
                        <input type="text" id="voucher" placeholder="Isi manual jika ada" class="w-full px-3 py-1.5 bg-white border border-slate-300 rounded-lg font-bold text-sm text-center">
                    </div>
                </div>
            </div>

        </main>

        <!-- FOOTER ACTION BUTTONS -->
        <footer class="mt-4 space-y-2">
            <button onclick="kirimKeWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3.5 px-4 rounded-xl text-md transition cursor-pointer shadow-md flex items-center justify-center gap-2 tracking-wide">
                <i class="fa-brands fa-whatsapp text-xl"></i> SALIN & KIRIM LAPORAN MKT
            </button>
            <div class="text-center">
                <a href="salesmon.html" class="inline-block text-xs font-bold text-slate-500 hover:text-slate-800 p-2"><i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Dashboard Sales</a>
            </div>
        </footer>

    </div>

    <!-- ==========================================
    JAVASCRIPT LOGIC CALCULATION & SHARE
    ========================================== -->
    <script>
        function hitungPersen(tgtId, aktId, pctId) {
            const tgt = parseFloat(document.getElementById(tgtId).value) || 0;
            const akt = parseFloat(document.getElementById(aktId).value) || 0;
            const pctEl = document.getElementById(pctId);
            
            if (tgt > 0) {
                const hasil = (akt / tgt) * 100;
                pctEl.innerText = `${Math.round(hasil)}%`;
            } else {
                pctEl.innerText = '0%';
            }
        }

        function hitungOtomatis() {
            hitungPersen('psm-tgt', 'psm-akt', 'psm-pct');
            hitungPersen('pwp-tgt', 'pwp-akt', 'pwp-pct');
            hitungPersen('serba-tgt', 'serba-akt', 'serba-pct');
            hitungPersen('suueger-tgt', 'suueger-akt', 'suueger-pct');
        }

        function kirimKeWhatsApp() {
            // Ambil values saat ini
            const psm = `${document.getElementById('psm-tgt').value}/${document.getElementById('psm-akt').value}/${document.getElementById('psm-pct').innerText}`;
            const pwp = `${document.getElementById('pwp-tgt').value}/${document.getElementById('pwp-akt').value}/${document.getElementById('pwp-pct').innerText}`;
            const serba = `${document.getElementById('serba-tgt').value}/${document.getElementById('serba-akt').value}/${document.getElementById('serba-pct').innerText}`;
            const suueger = `${document.getElementById('suueger-tgt').value}/${document.getElementById('suueger-akt').value}/${document.getElementById('suueger-pct').innerText}`;
            const cashback = document.getElementById('cashback').value.trim();
            const voucher = document.getElementById('voucher').value.trim();

            // Susun teks sesuai template persis
            let teksWA = `Laporan fokus MKT dengan Format,,\n\n`;
            teksWA += `Toko : Simpang Martapura 1GCX\n`;
            teksWA += `Nama : Solahudin\n`;
            teksWA += `Nik : 26014456\n\n`;
            teksWA += `PSM : ${psm}\n`;
            teksWA += `PWP : ${pwp}\n`;
            teksWA += `Serba : ${serba}\n`;
            teksWA += `Suueger : ${suueger}\n`;
            teksWA += `Cashback : ${cashback}\n`;
            teksWA += `Voucher : ${voucher}\n\n`;
            teksWA += `Terima Kasih`;

            // Eksekusi copy ke sistem dan buka WA
            navigator.clipboard.writeText(teksWA).then(() => {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(teksWA)}`, '_blank');
            }).catch(() => {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(teksWA)}`, '_blank');
            });
        }

        // Jalankan kalkulasi pertama kali saat halaman dibuka
        window.onload = function() {
            hitungOtomatis();
        };
    </script>
</body>
</html>
