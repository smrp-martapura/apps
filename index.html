<head>
    <meta charset="UTF-8">

    <!-- Meta Tags untuk PWA (Biar Bisa Jadi Aplikasi HP) -->
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Manifest Data Terintegrasi (Ikon & Konfigurasi Aplikasi) -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22SMRP%20Martapura%20Super%20App%22,%22short_name%22:%22SMRP%20App%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f8fafc%22,%22theme_color%22:%22%231d4ed8%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3222/3222675.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <!-- HEADER UTAMA -->
    <header class="bg-blue-700 text-white py-8 px-4 text-center shadow-md">
        <h1 class="text-2xl sm:text-3xl font-black tracking-wide uppercase">SMRP MARTAPURA SUPER APP</h1>
        <p class="text-sm text-blue-100 mt-2 font-medium">Satu Aplikasi untuk Semua Kebutuhan Operasional</p>
    </header>

    <!-- TOMBOL INSTALASI (Hanya muncul jika HP mendukung fitur instal langsung) -->
    <div id="install-container" class="hidden max-w-xl w-full mx-auto px-6 pt-4">
        <button id="btn-install" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-black py-3 px-4 rounded-xl shadow-md flex items-center justify-center gap-2 transition animate-bounce">
            <i class="fa-solid fa-download"></i> INSTAL SMRP SUPER APP DI HP
        </button>
    </div>

    <!-- KONTEN MENU UTAMA -->
    <main class="flex-1 max-w-xl w-full mx-auto p-6 space-y-6">

        <!-- Tombol List RH -->
        <a href="list_rh.html" class="block bg-white p-5 rounded-2xl shadow-sm border-t-4 border-blue-600 hover:shadow-md transition">
            <div class="flex items-start space-x-4">
                <div class="p-3 bg-blue-50 text-blue-600 rounded-xl"><i class="fa-solid fa-clipboard-list text-2xl w-8"></i></div>
                <div>
                    <h2 class="text-xl font-bold">ListRH</h2>
                    <p class="text-sm text-slate-500">Akses data administrasi ListRH.</p>
                </div>
            </div>
        </a>

        <!-- Tombol Fokus Marketing -->
        <a href="fokus_mkt.html" class="block bg-white p-5 rounded-2xl shadow-sm border-t-4 border-emerald-600 hover:shadow-md transition">
            <div class="flex items-start space-x-4">
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fa-solid fa-bullseye text-2xl w-8"></i></div>
                <div>
                    <h2 class="text-xl font-bold">Fokus Marketing</h2>
                    <p class="text-sm text-slate-500">Pantau program promosi dan target.</p>
                </div>
            </div>
        </a>

        <!-- Tombol IKT / Sales Monitoring -->
        <a href="salesmon.html" class="block bg-white p-5 rounded-2xl shadow-sm border-t-4 border-rose-600 hover:shadow-md transition">
            <div class="flex items-start space-x-4">
                <div class="p-3 bg-rose-50 text-rose-600 rounded-xl"><i class="fa-solid fa-chart-simple text-2xl w-8"></i></div>
                <div>
                    <h2 class="text-xl font-bold">IKT & Sales Monitoring</h2>
                    <p class="text-sm text-slate-500">Laporan performa dan pencapaian sales.</p>
                </div>
            </div>
        </a>

    </main>

    <!-- FOOTER -->
    <footer class="text-center py-4 text-xs text-slate-400 font-medium">
        SMRP Super App &copy; 2026 • 1GCX SIMPANG MARTAPURA
    </footer>

    <!-- SCRIPT UTK MEMICU FITUR INSTAL HP -->
    <script>
        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const btnInstall = document.getElementById('btn-install');

        // Deteksi jika browser mendeteksi aplikasi ini siap diinstal
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Munculkan tombol instalasi rahasia di atas
            installContainer.classList.remove('hidden');
        });

        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('User menginstal aplikasi.');
            }
            deferredPrompt = null;
            installContainer.classList.add('hidden');
        });

        window.addEventListener('appinstalled', () => {
            installContainer.classList.add('hidden');
            console.log('Aplikasi sukses terinstal di beranda HP.');
        });

        // Registrasi Service Worker Otomatis agar PWA Aktif Valid
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log(err));
        }
    </script>
</body>
</html>
